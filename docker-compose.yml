version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: blog123456
      MYSQL_DATABASE: blog
    volumes:
      - mysql-data:/var/lib/mysql
      - ./BlogServer/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  blogserver:
    build:
      context: ./BlogServer
      dockerfile: Dockerfile
    container_name: blog-server
    restart: always
    expose:
      - "4000"
      - "4001"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: blog123456
      DB_NAME: blog
      SERVER_PORT: 4000
    depends_on:
      mysql:
        condition: service_healthy

  blog:
    build:
      context: ./BlogWeb
      dockerfile: Dockerfile
    container_name: blog
    restart: always
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: https://liuzirui.top
    depends_on:
      - blogserver

  nginx:
    image: nginx:alpine
    container_name: blog-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - blogserver
      - blog

volumes:
  mysql-data:
